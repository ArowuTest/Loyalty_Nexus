# docker-compose.yml
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: loyalty_nexus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./backend
    command: ["/api"]
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://user:pass@db:5432/loyalty_nexus?sslmode=disable
      REDIS_URL: redis:6379
    depends_on:
      - db
      - redis

  worker:
    build: ./backend
    command: ["/worker"]
    environment:
      DATABASE_URL: postgres://user:pass@db:5432/loyalty_nexus?sslmode=disable
      REDIS_URL: redis:6379
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:8080/api/v1
    depends_on:
      - api

volumes:
  postgres_data:
