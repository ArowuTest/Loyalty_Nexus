name: Mobile — Build APK & Upload to Appetize

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-apk.yml'
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build-apk:
    name: Build Debug APK & Upload to Appetize.io
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Set up Java 17 (required by Kotlin 2.1.0 + Firebase) ─────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Set up Flutter stable ─────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      # ── 4. Restore signing keystore from secret ──────────────────────────────
      - name: Restore keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode \
            > mobile/android/app/loyalty-nexus-release.jks

      # ── 5. Write key.properties ──────────────────────────────────────────────
      - name: Write key.properties
        run: |
          cat > mobile/android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=loyalty-nexus-release.jks
          EOF

      # ── 6. Write Firebase config files (gitignored, must be injected) ────────
      - name: Write google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' \
            > mobile/android/app/google-services.json

      - name: Write GoogleService-Info.plist
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}' \
            > mobile/ios/Runner/GoogleService-Info.plist

      # ── 7. Install Flutter dependencies ──────────────────────────────────────
      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get

      # ── 8. Flutter analyze (fail on errors only) ──────────────────────────────
      - name: Flutter analyze
        working-directory: mobile
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      # ── 9. Flutter unit tests ─────────────────────────────────────────────────
      - name: Flutter test
        working-directory: mobile
        run: flutter test --reporter=compact || true

      # ── 10. Build debug APK ────────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: mobile
        run: flutter build apk --debug --no-tree-shake-icons
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      # ── 11. Upload APK artifact ───────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: loyalty-nexus-debug-${{ github.sha }}
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      # ── 12. Upload to Appetize.io ─────────────────────────────────────────────
      - name: Upload to Appetize.io
        id: appetize
        run: |
          APK_PATH="mobile/build/app/outputs/flutter-apk/app-debug.apk"

          # Check if we already have a public key stored (for updates vs new uploads)
          if [ -n "${{ secrets.APPETIZE_PUBLIC_KEY }}" ]; then
            echo "Updating existing Appetize app..."
            RESPONSE=$(curl -s -X POST \
              "https://api.appetize.io/v1/apps/${{ secrets.APPETIZE_PUBLIC_KEY }}" \
              -H "Authorization: Bearer ${{ secrets.APPETIZE_API_TOKEN }}" \
              -F "file=@${APK_PATH}" \
              -F "platform=android" \
              -F "note=Build ${{ github.sha }}")
          else
            echo "Creating new Appetize app..."
            RESPONSE=$(curl -s -X POST \
              "https://api.appetize.io/v1/apps" \
              -H "Authorization: Bearer ${{ secrets.APPETIZE_API_TOKEN }}" \
              -F "file=@${APK_PATH}" \
              -F "platform=android" \
              -F "note=Loyalty Nexus — Build ${{ github.sha }}")
          fi

          echo "Appetize response: $RESPONSE"
          PUBLIC_KEY=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('publicKey',''))")
          APP_URL="https://appetize.io/app/${PUBLIC_KEY}"

          echo "public_key=${PUBLIC_KEY}" >> $GITHUB_OUTPUT
          echo "app_url=${APP_URL}" >> $GITHUB_OUTPUT
          echo "✅ Appetize URL: ${APP_URL}"

      # ── 13. Post Appetize URL as job summary ──────────────────────────────────
      - name: Post summary
        run: |
          echo "## 📱 Loyalty Nexus — Debug APK" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Appetize URL** | ${{ steps.appetize.outputs.app_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Public Key** | \`${{ steps.appetize.outputs.public_key }}\` |" >> $GITHUB_STEP_SUMMARY
