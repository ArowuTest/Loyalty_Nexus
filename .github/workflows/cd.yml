name: CD — Deploy to Production

# ─────────────────────────────────────────────────────────────────────────────
# This workflow runs ONLY after CI passes on main.
# It deploys backend to Render and triggers Vercel builds for frontend/admin.
# Render autoDeploy is disabled in render.yaml — this is the ONLY deploy path.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows: ["CI — Loyalty Nexus"]
    branches: [main]
    types: [completed]

  # Allow manual re-deploy from GitHub UI without a new push
  workflow_dispatch:
    inputs:
      service:
        description: 'Which service to deploy (all | backend | frontend | admin)'
        required: false
        default: 'all'

env:
  RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
  VERCEL_TOKEN:   ${{ secrets.VERCEL_TOKEN }}

jobs:
  # ── Gate: only run if CI passed ─────────────────────────────────────────────
  check-ci:
    name: CI Gate
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      should_deploy: ${{ steps.gate.outputs.deploy }}
    steps:
      - name: Gate check
        id: gate
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual trigger — deploying"
            echo "deploy=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.workflow_run.conclusion }}" == "success" ]; then
            echo "CI passed — deploying"
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "CI did not pass — skipping deploy"
            echo "deploy=false" >> $GITHUB_OUTPUT
          fi

  # ── Backend: Render API + Worker ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Render)
    runs-on: ubuntu-latest
    needs: check-ci
    if: |
      needs.check-ci.outputs.should_deploy == 'true' &&
      (github.event.inputs.service == 'all' || github.event.inputs.service == 'backend' || github.event.inputs.service == '')
    steps:
      - name: Trigger Render deploy — API service
        run: |
          echo "Deploying loyalty-nexus-api..."
          RESPONSE=$(curl -s -o /tmp/render_api.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_API }}/deploys" \
            -d '{"clearCache": "do_not_clear"}')
          cat /tmp/render_api.json
          if [ "$RESPONSE" -ne 201 ]; then
            echo "❌ Render API deploy trigger failed (HTTP $RESPONSE)"
            exit 1
          fi
          echo "✅ Render API deploy triggered"
          DEPLOY_ID=$(python3 -c "import sys,json; d=json.load(open('/tmp/render_api.json')); print(d.get('id',''))")
          echo "Deploy ID: $DEPLOY_ID"
          echo "RENDER_API_DEPLOY_ID=$DEPLOY_ID" >> $GITHUB_ENV

      - name: Trigger Render deploy — Worker service
        run: |
          echo "Deploying loyalty-nexus-worker..."
          RESPONSE=$(curl -s -o /tmp/render_worker.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_WORKER }}/deploys" \
            -d '{"clearCache": "do_not_clear"}')
          cat /tmp/render_worker.json
          if [ "$RESPONSE" -ne 201 ]; then
            echo "❌ Render Worker deploy trigger failed (HTTP $RESPONSE)"
            exit 1
          fi
          echo "✅ Render Worker deploy triggered"

      - name: Wait for API deployment to complete
        timeout-minutes: 20
        run: |
          if [ -z "$RENDER_API_DEPLOY_ID" ]; then
            echo "No deploy ID — skipping wait"
            exit 0
          fi
          echo "Waiting for deploy $RENDER_API_DEPLOY_ID to complete..."
          for i in $(seq 1 60); do
            sleep 10
            STATUS=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_API }}/deploys/$RENDER_API_DEPLOY_ID" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))")
            echo "  [$i/60] Status: $STATUS"
            if [ "$STATUS" == "live" ]; then
              echo "✅ Deployment is live!"
              break
            elif [ "$STATUS" == "deactivated" ] || [ "$STATUS" == "build_failed" ] || [ "$STATUS" == "update_failed" ]; then
              echo "❌ Deployment failed with status: $STATUS"
              exit 1
            fi
          done

      - name: Smoke test — API health check
        run: |
          echo "Running smoke test on https://loyalty-nexus-api.onrender.com/health"
          for i in 1 2 3 4 5; do
            sleep 15
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://loyalty-nexus-api.onrender.com/health)
            echo "  Attempt $i: HTTP $STATUS"
            if [ "$STATUS" == "200" ]; then
              echo "✅ API health check passed"
              exit 0
            fi
          done
          echo "❌ API health check failed after 5 attempts"
          exit 1

  # ── Frontend: Vercel ──────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: check-ci
    if: |
      needs.check-ci.outputs.should_deploy == 'true' &&
      (github.event.inputs.service == 'all' || github.event.inputs.service == 'frontend' || github.event.inputs.service == '')
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy Frontend to Vercel (Production)
        working-directory: frontend
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}
        run: |
          # Link project explicitly (creates .vercel/project.json without rootDirectory)
          # then deploy directly — Vercel builds on their servers, no local path doubling.
          mkdir -p .vercel
          echo "{\"orgId\":\"$VERCEL_ORG_ID\",\"projectId\":\"$VERCEL_PROJECT_ID\"}" > .vercel/project.json
          DEPLOY_URL=$(vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          echo "✅ Frontend deployed: $DEPLOY_URL"
          echo "FRONTEND_URL=$DEPLOY_URL" >> $GITHUB_ENV

      - name: Smoke test — Frontend
        run: |
          echo "Testing $FRONTEND_URL"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$FRONTEND_URL" || echo "000")
          if [ "$STATUS" == "200" ] || [ "$STATUS" == "308" ]; then
            echo "✅ Frontend smoke test passed (HTTP $STATUS)"
          else
            echo "⚠️ Frontend returned HTTP $STATUS (may still be warming up)"
          fi

  # ── Admin: Vercel ─────────────────────────────────────────────────────────────
  deploy-admin:
    name: Deploy Admin (Vercel)
    runs-on: ubuntu-latest
    needs: check-ci
    if: |
      needs.check-ci.outputs.should_deploy == 'true' &&
      (github.event.inputs.service == 'all' || github.event.inputs.service == 'admin' || github.event.inputs.service == '')
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy Admin to Vercel (Production)
        working-directory: admin
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
        run: |
          # Link project explicitly (creates .vercel/project.json without rootDirectory)
          # then deploy directly — Vercel builds on their servers, no local path doubling.
          mkdir -p .vercel
          echo "{\"orgId\":\"$VERCEL_ORG_ID\",\"projectId\":\"$VERCEL_PROJECT_ID\"}" > .vercel/project.json
          DEPLOY_URL=$(vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          echo "✅ Admin deployed: $DEPLOY_URL"
          echo "ADMIN_URL=$DEPLOY_URL" >> $GITHUB_ENV

      - name: Smoke test — Admin
        run: |
          echo "Testing $ADMIN_URL"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$ADMIN_URL" || echo "000")
          if [ "$STATUS" == "200" ] || [ "$STATUS" == "308" ]; then
            echo "✅ Admin smoke test passed (HTTP $STATUS)"
          else
            echo "⚠️ Admin returned HTTP $STATUS"
          fi

  # ── Summary: post deployment report ──────────────────────────────────────────
  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend, deploy-admin]
    if: always()
    steps:
      - name: Write job summary
        run: |
          echo "## 🚀 Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend (Render API + Worker) | ${{ needs.deploy-backend.result == 'success' && '✅ Deployed' || needs.deploy-backend.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (Vercel) | ${{ needs.deploy-frontend.result == 'success' && '✅ Deployed' || needs.deploy-frontend.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Admin (Vercel) | ${{ needs.deploy-admin.result == 'success' && '✅ Deployed' || needs.deploy-admin.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API | https://loyalty-nexus-api.onrender.com |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | https://loyalty-nexus.vercel.app |" >> $GITHUB_STEP_SUMMARY
          echo "| Admin | https://loyalty-nexus-admin.vercel.app |" >> $GITHUB_STEP_SUMMARY
