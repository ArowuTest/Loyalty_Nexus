name: loyalty_nexus
description: Loyalty Nexus — Nigeria's Premium Loyalty Rewards App
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Data / serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # HTTP
  dio: ^5.7.0
  retrofit: ^4.4.1

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.5

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.3.1
  cached_network_image: ^3.4.1
  fl_chart: ^0.70.2
  percent_indicator: ^4.2.5
  another_flushbar: ^1.12.30
  flutter_animate: ^4.5.2
  gap: ^3.0.1
  confetti: ^0.8.0
  connectivity_plus: ^6.1.4

  # Device / Platform
  local_auth: ^2.3.0
  permission_handler: ^11.3.0
  device_info_plus: ^10.1.2
  package_info_plus: ^8.1.3
  url_launcher: ^6.3.1

  # Notifications
  firebase_core: ^3.11.0
  firebase_messaging: ^15.2.0
  flutter_local_notifications: ^18.0.1

  # Analytics
  firebase_analytics: ^11.4.0

  cupertino_icons: ^1.0.8
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  riverpod_generator: ^2.4.3
  json_serializable: ^6.8.0
  retrofit_generator: ^9.1.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
  fonts:
    - family: Syne
      fonts:
        - asset: assets/fonts/Syne-Bold.ttf
          weight: 700
        - asset: assets/fonts/Syne-ExtraBold.ttf
          weight: 800
