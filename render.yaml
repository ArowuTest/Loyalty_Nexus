# ═══════════════════════════════════════════════════════════════════════════
#  LOYALTY NEXUS — Render.com Infrastructure Definition
#  Docs: https://render.com/docs/yaml-spec
# ═══════════════════════════════════════════════════════════════════════════

services:

  # ─── API Web Service (Docker) ─────────────────────────────────────────────
  - type: web
    name: loyalty-nexus-api
    runtime: docker
    repo: https://github.com/ArowuTest/Loyalty_Nexus
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerBuildTarget: api

    # Migrations run inside entrypoint.sh (before exec /api).
    # golang-migrate is idempotent — already-applied migrations are skipped.
    # If a migration fails → container exits non-zero → Render keeps
    # the previous healthy version live (zero-downtime guarantee).

    # Render web services always bind on port 10000.
    # The Go API reads PORT env var and defaults to 8080 — we override here.
    # Health check hits /health (plain path, not /api/v1/health).
    healthCheckPath: /health
    plan: starter
    autoDeploy: true

    envVars:
      # ── Server ───────────────────────────────────────────────────────────
      - key: PORT
        value: "10000"
      - key: GO_ENV
        value: production
      - key: ENVIRONMENT
        value: production
      - key: OPERATION_MODE
        value: independent

      # ── Database ─────────────────────────────────────────────────────────
      # DATABASE_URL uses the internal hostname (fast, no SSL needed at runtime)
      - key: DATABASE_URL
        fromDatabase:
          name: loyalty-nexus-db
          property: connectionString


      # ── Redis ─────────────────────────────────────────────────────────────
      - key: REDIS_URL
        fromService:
          type: redis
          name: loyalty-nexus-redis
          property: connectionString

      # ── Security ─────────────────────────────────────────────────────────
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRY_HOURS
        value: "24"
      - key: ADMIN_JWT_EXPIRY_HOURS
        value: "8"
      - key: AES_256_KEY
        sync: false

      # ── AI / LLM Providers ───────────────────────────────────────────────
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: HF_IMAGE_MODEL
        value: black-forest-labs/FLUX.1-schnell
      - key: FAL_API_KEY
        sync: false
      - key: POLLINATIONS_SECRET_KEY
        sync: false
      - key: ASSEMBLY_AI_KEY
        sync: false

      # ── Voice / TTS ──────────────────────────────────────────────────────
      - key: GOOGLE_CLOUD_TTS_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        value: 21m00Tcm4TlvDq8ikWAM

      # ── Translation ──────────────────────────────────────────────────────
      - key: GOOGLE_TRANSLATE_API_KEY
        sync: false

      # ── Asset Storage ─────────────────────────────────────────────────────
      - key: STORAGE_BACKEND
        sync: false
      - key: STORAGE_CDN_BASE_URL
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_ENDPOINT
        sync: false

      # ── Background Removal ───────────────────────────────────────────────
      - key: REMBG_SERVICE_URL
        sync: false
      - key: REMOVEBG_API_KEY
        sync: false

      # ── SMS / Telco ──────────────────────────────────────────────────────
      - key: TERMII_API_KEY
        sync: false
      - key: TERMII_SENDER_ID
        value: Nexus

      # ── Payments ─────────────────────────────────────────────────────────
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_WEBHOOK_SECRET
        sync: false
      - key: VTPASS_API_KEY
        sync: false
      - key: VTPASS_PUBLIC_KEY
        sync: false
      - key: VTPASS_SECRET_KEY
        sync: false
      - key: VTPASS_BASE_URL
        value: https://vtpass.com/api
      - key: VTPASS_ENV
        value: sandbox
      - key: MTN_MOMO_BASE_URL
        value: https://sandbox.momodeveloper.mtn.com
      - key: MTN_MOMO_SUBSCRIPTION_KEY
        sync: false
      - key: MTN_MOMO_API_USER
        sync: false
      - key: MTN_MOMO_API_KEY
        sync: false
      - key: MTN_MOMO_ENVIRONMENT
        value: sandbox
      - key: MOMO_CALLBACK_URL
        sync: false

      # ── CORS / Frontend URLs ─────────────────────────────────────────────
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false

      # ── Fraud Guard Thresholds ───────────────────────────────────────────
      - key: FRAUD_MAX_RECHARGE_24H
        value: "20"
      - key: FRAUD_MAX_SPIN_24H
        value: "10"
      - key: FRAUD_MIN_RECHARGE_NAIRA
        value: "100"

      # ── Feature Flags ────────────────────────────────────────────────────
      - key: REGIONAL_WARS_PRIZE_POOL_NAIRA
        value: "500000"
      - key: MONTHLY_DRAW_PRIZE_NAIRA
        value: "1000000"

  # ─── Background Worker (Docker) ───────────────────────────────────────────
  - type: worker
    name: loyalty-nexus-worker
    runtime: docker
    repo: https://github.com/ArowuTest/Loyalty_Nexus
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerBuildTarget: worker
    plan: starter
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: loyalty-nexus-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: loyalty-nexus-redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: AES_256_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: TERMII_API_KEY
        sync: false
      - key: TERMII_SENDER_ID
        value: Nexus
      - key: OPERATION_MODE
        value: independent

  # ─── Redis ────────────────────────────────────────────────────────────────
  - type: redis
    name: loyalty-nexus-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

databases:
  # ─── PostgreSQL ───────────────────────────────────────────────────────────
  - name: loyalty-nexus-db
    plan: basic_256mb
    databaseName: nexus
    user: nexus
