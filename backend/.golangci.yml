version: "2"

run:
  timeout: 5m

# Note: linter selection is controlled via the CI workflow args:
#   --enable-only=govet,errcheck,staticcheck
# This config file only provides settings and per-rule exclusions.

linters:
  settings:
    staticcheck:
      # Enable all staticcheck checks except ST1020 (exported method comment format).
      # ST1020 is excluded because handler methods use route-description comments
      # (e.g. "// ── GET /api/v1/draws") as an intentional architectural convention
      # that is more informative than enforced Go-doc style for HTTP handlers.
      checks: ["all", "-ST1020"]

  exclusions:
    rules:
      # wars_ws.go uses nhooyr.io/websocket which is maintained as
      # github.com/coder/websocket (same library, different import path).
      # All deprecated call sites have //nolint:staticcheck inline.
      - path: wars_ws\.go
        linters:
          - staticcheck
        text: "SA1019"
