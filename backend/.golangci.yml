run:
  timeout: 5m

# Note: linter selection is controlled entirely by the CI workflow flags:
#   --disable=typecheck --enable=govet,errcheck,staticcheck
# This config file only provides settings and issue exclusions — no linter
# enable/disable directives here to avoid conflicting with CLI flags.

linters-settings:
  staticcheck:
    checks: ["all"]

issues:
  exclude-rules:
    # wars_ws.go uses nhooyr.io/websocket which is maintained as
    # github.com/coder/websocket (same library, different import path).
    # All deprecated call sites have //nolint:staticcheck inline.
    - path: wars_ws\.go
      linters:
        - staticcheck
      text: "SA1019"
